<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membros - Templum</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>html.auth-pending body{display:none!important;}</style>
    <script>document.documentElement.classList.add('auth-pending');if(!localStorage.getItem('templum-auth-token')){window.location.replace('/login.html');}else{document.documentElement.classList.remove('auth-pending');}</script>
    <style>
        .members-container { max-width: 900px; }
        .member-table { width: 100%; border-collapse: collapse; margin-top: 24px; background: var(--bg-surface); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-sm); }
        .member-table th { background: rgba(0,0,0,0.2); padding: 16px; text-align: left; font-size: 13px; color: var(--text-muted); text-transform: uppercase;}
        .member-table td { padding: 16px; border-bottom: 1px solid var(--border); color: var(--text-main); font-weight: 500;}
        .member-table tr:last-child td { border-bottom: none; }
        
        .role-badge { 
            padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
        }
        .role-master { background: rgba(79, 70, 229, 0.2); color: #818cf8; }
        .role-gestor { background: rgba(52, 211, 153, 0.2); color: #34d399; }
        .role-membro { background: rgba(156, 163, 175, 0.2); color: #9ca3af; }
        
        .add-user-card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--primary); border-radius: 12px; padding: 24px; margin-bottom: 32px; display: flex; gap: 16px; align-items: flex-end;}
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border-radius: 8px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; outline:none; font-family:var(--font); }

        @media (max-width: 768px) {
            .members-container {
                max-width: 100%;
            }

            .add-user-card {
                flex-direction: column;
                align-items: stretch;
                padding: 18px;
            }

            .member-table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }

            main.main-content {
                padding: 20px !important;
            }
        }

        @media (max-width: 480px) {
            .member-table th,
            .member-table td {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
    <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"><i class="fa-solid fa-shapes"></i></div>
                    <span class="logo-text">Templum</span>
                </div>
            </div>

            <div class="sidebar-menu">
                <div id="sidebar-menu-content"></div>
            </div>
            
            <div class="user-profile">
                <div class="user-info" style="width:100%;">
                    <button onclick="localStorage.clear(); window.location.href='/login.html';" style="width:100%; padding: 10px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border:none; border-radius:8px; cursor:pointer; font-weight: 600;"><i class="fa-solid fa-right-from-bracket"></i> Sair do Sistema</button>
                </div>
            </div>
        </aside>

    <main class="main-content" style="padding: 32px 48px; overflow-y: auto;">
        <header class="app-header">
            <div>
                <h1 class="board-title">Painel de Usuários</h1>
                <p style="color: var(--text-muted); font-size: 14px; font-weight: 500;">Governança de acessos e delegação de tarefas na Agência.</p>
            </div>
        </header>

        <div class="members-container" style="margin-top: 32px;">
            
            <div class="add-user-card" id="add-user-box" style="display:none;">
                <div class="input-group">
                    <label>Nome</label>
                    <input type="text" id="nu-name" placeholder="Nome do usuário">
                </div>
                <div class="input-group">
                    <label>E-mail (Login Oficial)</label>
                    <input type="email" id="nu-email" placeholder="nome@templum.com">
                </div>
                <div class="input-group">
                    <label>Senha Provisória</label>
                    <input type="text" id="nu-pass" placeholder="A1!b2C3">
                </div>
                <div class="input-group">
                    <label>Hierarquia</label>
                    <select id="nu-role">
                        <option value="membro">Membro (Operacional)</option>
                        <option value="gestor">Gestor de Célula</option>
                        <option value="master">Poder de Master Admin</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Função</label>
                    <select id="nu-function">
                        <option value="membro">Membro</option>
                        <option value="editor">Editor</option>
                        <option value="design">Designer</option>
                        <option value="social">Social Media</option>
                        <option value="video">Videomaker</option>
                        <option value="fotografo">Fotógrafo</option>
                    </select>
                </div>
                <button class="btn" id="nu-btn" style="height: 44px; padding: 0 24px;"><i class="fa-solid fa-user-plus"></i></button>
            </div>

<h3 style="color:var(--text-main); font-weight:600;"><i class="fa-solid fa-address-card"></i> Pessoas Ativas na Base</h3>
            
            <div style="display:flex; gap:12px; margin-bottom:16px; align-items:center; flex-wrap:wrap;">
                <label style="font-size:13px; color:var(--text-muted);">Ordenar por:</label>
                <select id="sort-select" onchange="sortUsers()" style="padding:8px 12px; border-radius:8px; background: rgba(0,0,0,0.2); border:1px solid var(--border); color: var(--text-main);">
                    <option value="name">Nome</option>
                    <option value="email">E-mail</option>
                    <option value="role">Perfil</option>
                    <option value="function">Função</option>
                </select>
                <button class="btn" onclick="saveAllUsers()" style="margin-left:auto; background: var(--primary);"><i class="fa-solid fa-floppy-disk"></i> Salvar Alterações</button>
            </div>
            
            <table class="member-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Perfil (Role)</th>
                        <th>Função / Acessos</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <tr><td colspan="6" style="text-align:center;">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
    </div>

    <script>
        const pageToken = localStorage.getItem('templum-auth-token');
        if (!pageToken) window.location.href='/login.html';
        const getPageAuthHeaders = () => ({ 'Authorization': 'Bearer ' + pageToken });
        let allUsers = [];
        
        async function loadUsers() {
            try {
                const r = await fetch('/api/users', { headers: getPageAuthHeaders() });
                 if(r.status === 403 || r.status === 401) {
                     document.getElementById('users-tbody').innerHTML = '<tr><td colspan="6">Falha Fatal de Permissão: Apenas Masters/Gestores visualizam o RH.</td></tr>';
                     return;
                 }
                allUsers = await r.json();
                
                await loadUserFunctions();
                
                // Show create tool safely if token valid role
                document.getElementById('add-user-box').style.display = 'flex';
                
                sortUsers();
            } catch(e) {}
        }
        
        let userFunctions = [];
        
        async function loadUserFunctions() {
            try {
                const r = await fetch('/api/user-functions', { headers: getPageAuthHeaders() });
                if (r.ok) {
                    userFunctions = await r.json();
                } else {
                    userFunctions = [
                        { name: 'Membro' }, { name: 'Editor' }, { name: 'Designer' },
                        { name: 'Social Media' }, { name: 'Videomaker' }, { name: 'Fotógrafo' }
                    ];
                }
            } catch(e) { 
                userFunctions = [
                    { name: 'Membro' }, { name: 'Editor' }, { name: 'Designer' },
                    { name: 'Social Media' }, { name: 'Videomaker' }, { name: 'Fotógrafo' }
                ];
            }
        }
        
        function sortUsers() {
            const sortBy = document.getElementById('sort-select').value;
            const sorted = [...allUsers].sort((a, b) => {
                if (sortBy === 'name') return (a.name || '').localeCompare(b.name || '');
                if (sortBy === 'email') return (a.email || '').localeCompare(b.email || '');
                if (sortBy === 'role') return (a.role || '').localeCompare(b.role || '');
                if (sortBy === 'function') return (a.function || '').localeCompare(b.function || '');
                return 0;
            });
            renderUsers(sorted);
        }
        
        function renderUsers(users) {
            let h = '';
            users.forEach(u => {
                let badge = 'role-membro';
                let rName = 'Operação';
                if(u.role === 'master') { badge = 'role-master'; rName = 'Master Supremo'; }
                if(u.role === 'gestor') { badge = 'role-gestor'; rName = 'Líder Executivo'; }
                
                const functionOptions = userFunctions.map(f => 
                    `<option value="${f.name.toLowerCase()}" ${u.function === f.name.toLowerCase() ? 'selected' : ''}>${f.name}</option>`
                ).join('');
                
                h += `<tr>
                    <td><input type="text" value="${u.name || ''}" data-user-name="${u.id}" style="width:100%; padding:10px; border-radius:8px; background: rgba(0,0,0,0.08); border:1px solid var(--border); color: var(--text-main);"></td>
                    <td><input type="email" value="${u.email || ''}" data-user-email="${u.id}" style="width:100%; padding:10px; border-radius:8px; background: rgba(0,0,0,0.08); border:1px solid var(--border); color: var(--text-main);"></td>
                    <td>
                        <select data-user-role="${u.id}" style="width:100%; padding:10px; border-radius:8px; background: rgba(0,0,0,0.08); border:1px solid var(--border); color: var(--text-main);">
                            <option value="membro" ${u.role === 'membro' ? 'selected' : ''}>Membro</option>
                            <option value="gestor" ${u.role === 'gestor' ? 'selected' : ''}>Gestor</option>
                            <option value="master" ${u.role === 'master' ? 'selected' : ''}>Master</option>
                        </select>
                        <div style="margin-top:8px;"><span class="role-badge ${badge}">${rName}</span></div>
                    </td>
                    <td>
                        <label style="font-size:10px; color:var(--text-muted);">Função:</label>
                        <select data-user-function="${u.id}" style="width:100%; padding:8px; margin-bottom:8px; border-radius:6px; background: rgba(0,0,0,0.08); border:1px solid var(--border); color: var(--text-main);">
                            ${functionOptions}
                        </select>
                        <label style="font-size:10px; color:var(--text-muted);">Acesso a Boards:</label>
                        <div style="display:flex; flex-wrap:wrap; gap:4px;">
                            <label style="font-size:10px; display:flex; align-items:center;"><input type="checkbox" data-board-access="${u.id}" value="editorial" ${(u.allowed_boards || []).includes('editorial') ? 'checked' : ''}> Edit.</label>
                            <label style="font-size:10px; display:flex; align-items:center;"><input type="checkbox" data-board-access="${u.id}" value="design" ${(u.allowed_boards || []).includes('design') ? 'checked' : ''}> Des.</label>
                            <label style="font-size:10px; display:flex; align-items:center;"><input type="checkbox" data-board-access="${u.id}" value="photo" ${(u.allowed_boards || []).includes('photo') ? 'checked' : ''}> Fot.</label>
                            <label style="font-size:10px; display:flex; align-items:center;"><input type="checkbox" data-board-access="${u.id}" value="video" ${(u.allowed_boards || []).includes('video') ? 'checked' : ''}> Vid.</label>
                            <label style="font-size:10px; display:flex; align-items:center;"><input type="checkbox" data-board-access="${u.id}" value="gestao" ${(u.allowed_boards || []).includes('gestao') ? 'checked' : ''}> Gest.</label>
                        </div>
                    </td>
                    <td><span style="color:#10b981; font-size:13px; font-weight:600;"><i class="fa-solid fa-circle" style="font-size:8px; margin-right:4px;"></i>Ativo</span></td>
                    <td>
                        <button class="btn" style="background:transparent; color:red; padding:8px 10px;" onclick="delUser(${u.id})"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>`;
            });
            document.getElementById('users-tbody').innerHTML = h;
        }
        
        async function delUser(id) {
            if(confirm("Tirar acesso desta pessoa da plataforma?")) {
                const r = await fetch('/api/users/'+id, { method: 'DELETE', headers: getPageAuthHeaders()});
                if(r.ok) loadUsers();
                else alert('Nível Incompatível. Apenas Supremo.');
            }
        }
        
async function saveAllUsers() {
            const saves = allUsers.map(async u => {
                const name = document.querySelector(`[data-user-name="${u.id}"]`).value.trim();
                const email = document.querySelector(`[data-user-email="${u.id}"]`).value.trim();
                const role = document.querySelector(`[data-user-role="${u.id}"]`).value;
                const userFunction = document.querySelector(`[data-user-function="${u.id}"]`).value;
                
                const allowedBoards = [];
                document.querySelectorAll(`[data-board-access="${u.id}"]:checked`).forEach(cb => allowedBoards.push(cb.value));
                
                return fetch('/api/users/' + u.id, {
                    method: 'PUT',
                    headers: {'Content-Type':'application/json', ...getPageAuthHeaders()},
                    body: JSON.stringify({ name, email, role, function: userFunction, allowed_boards: allowedBoards })
                });
            });
            
            const results = await Promise.allSettled(saves);
            const errors = results.filter(r => r.status === 'rejected');
            if (errors.length === 0) {
                alert('Alterações salvas com sucesso!');
                loadUsers();
            } else {
                alert('Algumas alterações podem não ter sido salvas.');
            }
        }
        }

        document.getElementById('nu-btn').onclick = async () => {
             const name = document.getElementById('nu-name').value;
             const email = document.getElementById('nu-email').value;
             const password = document.getElementById('nu-pass').value;
             const role = document.getElementById('nu-role').value;
             const userFunction = document.getElementById('nu-function').value;
             if(!email || !password) return alert("Preencha Login e Senha!");

             const r = await fetch('/api/users', { 
                  method:'POST', headers: {'Content-Type':'application/json', ...getPageAuthHeaders()},
                 body: JSON.stringify({ name, email, password, role, function: userFunction })
             });
             if(r.ok) {
                 document.getElementById('nu-name').value = ''; document.getElementById('nu-email').value = ''; document.getElementById('nu-pass').value = '';
                 loadUsers();
             } else alert('Não foi possível gravar membro. Talvez email já exista ou você não tenha nível.');
        };
        
        loadUsers();
    </script>
    <script src="js/menu.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/board.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/init.js"></script>
</body>
</html>
